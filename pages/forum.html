<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commita - Fóruns</title>
  <script src="../js/config.js"></script>
  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- CSS EXTERNO -->
  <link rel="stylesheet" href="../css/forum.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="container">
      <div class="logo">
        <span class="logo-icon"><i class="fas fa-code-branch"></i></span>
        <span class="logo-text">Commita</span>
      </div>

      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input id="searchInput" type="text" placeholder="Buscar fórum ou tópico...">
      </div>

      <nav class="nav-links">
        <a href="feed.html"><i class="fas fa-home"></i> <span>Feed</span></a>
        <a href="forum.html" class="active"><i class="fas fa-users"></i> <span>Fóruns</span></a>
        <a href="perfil.html"><i class="fas fa-user"></i> <span>Perfil</span></a>
      </nav>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <main class="container main-layout">
    
    <!-- CONTEÚDO CENTRAL -->
    <section>
      <!-- Visão de Lista de Fóruns -->
      <div id="forumsView">
        <section class="hero">
          <h1>Fóruns da Comunidade</h1>
          <p>Escolha um assunto para tirar dúvidas, compartilhar soluções e conversar com outras pessoas da área de tecnologia.</p>

          <div class="filters">
            <button class="filter-btn active" data-filter="todos">Todos</button>
            <button class="filter-btn" data-filter="programacao">Programação</button>
            <button class="filter-btn" data-filter="desenvolvimento">Desenvolvimento</button>
            <button class="filter-btn" data-filter="dados">Dados</button>
            <button class="filter-btn" data-filter="carreira">Carreira</button>
            <button class="filter-btn" data-filter="outros">Outros</button>
          </div>
        </section>

        <section class="forums-grid" id="forumsGrid"></section>
      </div>

      <!-- Visão de Tópicos (Interna do Fórum) -->
      <section class="topic-section" id="topicView">
        <div class="topic-header">
          <div>
            <h2 id="topicForumTitle">Fórum</h2>
            <p id="topicForumDesc" style="color: var(--text-gray);"></p>
          </div>

          <button class="back-btn" id="backToForums">
            <i class="fas fa-arrow-left"></i> Voltar
          </button>
        </div>

        <div class="topic-list" id="topicList"></div>
      </section>
    </section>

    <!-- SIDEBAR DIREITA -->
    <aside class="sidebar">
      <div class="side-card">
        <div class="side-actions">
          <button class="create-btn secondary" id="openForumModal">
            <i class="fas fa-folder-plus"></i> Criar Fórum
          </button>

          <button class="create-btn" id="openTopicModal">
            <i class="fas fa-plus"></i> Criar Tópico
          </button>
        </div>
      </div>
    </aside>

  </main>

  <!-- MODAL: CRIAR TÓPICO -->
  <div class="modal-overlay" id="topicModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Criar novo tópico</h3>
        <button class="close-modal" id="closeTopicModal"><i class="fas fa-times"></i></button>
      </div>

      <form class="modal-form" id="topicForm">
        <div class="field">
          <label>Fórum</label>
          <select id="forumSelect" required></select>
        </div>

        <div class="field">
          <label>Título da dúvida</label>
          <input id="topicTitle" type="text" placeholder="Ex: Como resolver erro no Java?" required>
        </div>

        <div class="field">
          <label>Descrição</label>
          <textarea id="topicDescription" placeholder="Explique sua dúvida com detalhes..." required></textarea>
        </div>

        <div class="field">
          <label>Tags</label>
          <input id="topicTags" type="text" placeholder="Ex: Java, POO, Erro">
        </div>

        <button class="submit-btn" type="submit">Publicar tópico</button>
      </form>
    </div>
  </div>

  <!-- MODAL: CRIAR FÓRUM -->
  <div class="modal-overlay" id="forumModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Criar novo fórum</h3>
        <button class="close-modal" id="closeForumModal"><i class="fas fa-times"></i></button>
      </div>

      <form class="modal-form" id="forumForm">
        <div class="field">
          <label>Nome do fórum</label>
          <input id="forumName" type="text" placeholder="Ex: Inteligência Artificial" required>
        </div>

        <div class="field">
          <label>Descrição</label>
          <textarea id="forumDescription" placeholder="Descreva o objetivo do fórum..." required></textarea>
        </div>

        <div class="field">
          <label>Categoria</label>
          <select id="forumCategory" required>
            <option value="programacao">Programação</option>
            <option value="desenvolvimento">Desenvolvimento</option>
            <option value="dados">Dados</option>
            <option value="carreira">Carreira</option>
            <option value="outros">Outros</option>
          </select>
        </div>

        <div class="field">
          <label>Ícone</label>
          <select id="forumIcon" required>
            <option value="fas fa-code">Código</option>
            <option value="fas fa-robot">Inteligência Artificial</option>
            <option value="fas fa-mobile-screen-button">Mobile</option>
            <option value="fas fa-database">Banco de Dados</option>
            <option value="fab fa-github">GitHub</option>
            <option value="fas fa-palette">Design</option>
            <option value="fas fa-shield-halved">Segurança</option>
            <option value="fas fa-briefcase">Carreira</option>
          </select>
        </div>

        <button class="submit-btn" type="submit">Criar fórum</button>
      </form>
    </div>
  </div>

  <!-- JS EXTERNO -->
  <script src="../js/forum.js"></script>
</body>
</html>
