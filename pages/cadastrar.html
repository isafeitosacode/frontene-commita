<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Commita</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="../js/config.js"></script>    
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

    <div class="left-bg"></div>
    <div class="right-circle"></div>

    <div class="container">
        <div class="card">

            <div class="stepper">
                <div class="step">
                    <span>Dados Pessoais</span>
                    <div class="circle active" id="circle1">1</div>
                </div>
                <div class="step">
                    <span>Dados Cadastrais</span>
                    <div class="circle" id="circle2">2</div>
                </div>
            </div>

            <div class="form-area">
                <div class="erro" id="erro"></div>

                <form id="formCadastro">

                    <div id="step1">
                        <div class="form-group">
                            <label>Nome Completo</label>
                            <input type="text" id="nome">
                        </div>
                        <div class="form-group">
                            <label>@ Usuário</label>
                            <input type="text" id="usuario">
                        </div>
                        <div class="form-group">
                            <label>E-mail</label>
                            <input type="email" id="email">
                        </div>
                        <div class="buttons" style="justify-content: space-between;">
                            <a href="login.html" style="color: #8f00ff; text-decoration: none;">Já tem conta?</a>
                            <button type="button" class="btn-proximo" id="btnProximo">PRÓXIMO</button>
                        </div>
                    </div>

                    <div id="step2" style="display: none;">
                        <div class="form-group">
                            <label>Número de telefone</label>
                            <input type="tel" id="telefone">
                        </div>
                        <div class="form-group">
                            <label>Senha</label>
                            <div class="password-wrapper">
                                <input type="password" id="senha">
                                <i class="fa-solid fa-eye-slash toggle"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Confirme sua senha</label>
                            <div class="password-wrapper">
                                <input type="password" id="confirmarSenha">
                                <i class="fa-solid fa-eye-slash toggle"></i>
                            </div>
                        </div>
                        <div class="buttons">
                            <button type="button" class="btn-voltar" id="btnVoltar">VOLTAR</button>
                            <button type="submit" class="btn-proximo">CADASTRAR</button>
                        </div>
                    </div>

                </form>
            </div>

        </div>
    </div>

    <script src="../js/cadastrar.js"></script>
</body>
</html>
